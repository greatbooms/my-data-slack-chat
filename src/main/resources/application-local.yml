spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5433/my_data}
    username: ${DATABASE_USERNAME:my_data}
    password: ${DATABASE_PASSWORD:my_data}
logging:
  level:
    com.mydata: DEBUG
my-data:
  slack:
    signing-secret: ${SLACK_SIGNING_SECRET:local-signing-secret}
    app-token: ${SLACK_APP_TOKEN:}
    bot-token: ${SLACK_BOT_TOKEN:}
    socket-mode-enabled: ${SLACK_SOCKET_MODE_ENABLED:false}
    http-events-enabled: ${SLACK_HTTP_EVENTS_ENABLED:false}
