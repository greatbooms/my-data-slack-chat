spring:
  application:
    name: my-data
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/my_data}
    username: ${DATABASE_USERNAME:my_data}
    password: ${DATABASE_PASSWORD:my_data}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  liquibase:
    change-log: classpath:/db/changelog/db.changelog-master.json
  graphql:
    http:
      path: /admin/graphql

server:
  port: ${SERVER_PORT:50506}

my-data:
  admin:
    bootstrap:
      email: ${ADMIN_BOOTSTRAP_EMAIL:}
      password: ${ADMIN_BOOTSTRAP_PASSWORD:}
      display-name: ${ADMIN_BOOTSTRAP_DISPLAY_NAME:관리자}
  slack:
    signing-secret: ${SLACK_SIGNING_SECRET:}
    app-token: ${SLACK_APP_TOKEN:}
    bot-token: ${SLACK_BOT_TOKEN:}
    socket-mode-enabled: ${SLACK_SOCKET_MODE_ENABLED:false}
    http-events-enabled: ${SLACK_HTTP_EVENTS_ENABLED:false}
  notion:
    api-token: ${NOTION_API_TOKEN:}
    api-version: ${NOTION_API_VERSION:2026-03-11}
    base-url: ${NOTION_BASE_URL:https://api.notion.com}
    connect-timeout: ${NOTION_CONNECT_TIMEOUT:5s}
    request-timeout: ${NOTION_REQUEST_TIMEOUT:30s}
  embedding:
    model: ${EMBEDDING_MODEL:deterministic-1536}
    dimensions: 1536
  llm:
    provider: ${MY_DATA_LLM_PROVIDER:stub}
    model: ${MY_DATA_LLM_MODEL:gpt-5.4-mini}
    max-input-chunks: ${MY_DATA_LLM_MAX_INPUT_CHUNKS:5}
    max-chars-per-chunk: ${MY_DATA_LLM_MAX_CHARS_PER_CHUNK:1200}
    max-output-tokens: ${MY_DATA_LLM_MAX_OUTPUT_TOKENS:700}
    connect-timeout: ${MY_DATA_LLM_CONNECT_TIMEOUT:5s}
    request-timeout: ${MY_DATA_LLM_REQUEST_TIMEOUT:${MY_DATA_LLM_TIMEOUT_SECONDS:30}s}
    openai:
      base-url: ${OPENAI_BASE_URL:https://api.openai.com}
      api-key: ${OPENAI_API_KEY:}
