query ViewerAndDashboard {
  viewer {
    id
    email
    displayName
    role
  }
  dashboardSummary {
    userCount
    dataSourceCount
    runningJobCount
  }
}

query AdminDataSources {
  dataSources {
    totalCount
    items {
      ...DataSourceFields
    }
  }
}

query AdminUsers {
  users {
    totalCount
    items {
      ...UserFields
    }
  }
}

query AdminWorkspaces($includeDeleted: Boolean = true) {
  workspaces(includeDeleted: $includeDeleted) {
    totalCount
    items {
      ...WorkspaceFields
    }
  }
}

query AdminWorkspaceManagement($includeDeleted: Boolean = true) {
  users {
    totalCount
    items {
      ...UserFields
    }
  }
  workspaces(includeDeleted: $includeDeleted) {
    totalCount
    items {
      ...WorkspaceFields
    }
  }
}

query AdminExternalIdentityManagement {
  externalIdentities {
    totalCount
    items {
      ...ExternalIdentityFields
    }
  }
  users {
    totalCount
    items {
      ...UserFields
    }
  }
  workspaces {
    totalCount
    items {
      ...WorkspaceFields
    }
  }
}

query AdminDataSourceFormOptions {
  users {
    totalCount
    items {
      ...UserFields
    }
  }
  workspaces {
    totalCount
    items {
      ...WorkspaceFields
    }
  }
}

query AdminIngestionJobs($dataSourceId: ID!, $first: Int = 20) {
  ingestionJobs(dataSourceId: $dataSourceId, first: $first) {
    ...IngestionJobFields
  }
}

mutation CreateUser($input: CreateUserInput!) {
  createUser(input: $input) {
    ...UserFields
  }
}

mutation UpdateUser($id: ID!, $input: UpdateUserInput!) {
  updateUser(id: $id, input: $input) {
    ...UserFields
  }
}

mutation DisableUser($id: ID!) {
  disableUser(id: $id) {
    ...UserFields
  }
}

mutation SoftDeleteUser($id: ID!) {
  softDeleteUser(id: $id) {
    ...UserFields
  }
}

mutation RestoreUser($id: ID!) {
  restoreUser(id: $id) {
    ...UserFields
  }
}

mutation ResetUserPassword($id: ID!, $input: ResetUserPasswordInput!) {
  resetUserPassword(id: $id, input: $input) {
    ...UserFields
  }
}

mutation CreateWorkspace($input: CreateWorkspaceInput!) {
  createWorkspace(input: $input) {
    ...WorkspaceFields
  }
}

mutation UpdateWorkspace($id: ID!, $input: UpdateWorkspaceInput!) {
  updateWorkspace(id: $id, input: $input) {
    ...WorkspaceFields
  }
}

mutation SoftDeleteWorkspace($id: ID!) {
  softDeleteWorkspace(id: $id) {
    ...WorkspaceFields
  }
}

mutation RestoreWorkspace($id: ID!) {
  restoreWorkspace(id: $id) {
    ...WorkspaceFields
  }
}

mutation CreateExternalIdentity($input: CreateExternalIdentityInput!) {
  createExternalIdentity(input: $input) {
    ...ExternalIdentityFields
  }
}

mutation UpdateExternalIdentity($id: ID!, $input: UpdateExternalIdentityInput!) {
  updateExternalIdentity(id: $id, input: $input) {
    ...ExternalIdentityFields
  }
}

mutation DeleteExternalIdentity($id: ID!) {
  deleteExternalIdentity(id: $id)
}

mutation CreateDataSource($input: CreateDataSourceInput!) {
  createDataSource(input: $input) {
    ...DataSourceFields
  }
}

mutation UpdateDataSource($id: ID!, $input: UpdateDataSourceInput!) {
  updateDataSource(id: $id, input: $input) {
    ...DataSourceFields
  }
}

mutation SoftDeleteDataSource($id: ID!) {
  softDeleteDataSource(id: $id) {
    ...DataSourceFields
  }
}

mutation RequestDataSourceSync($id: ID!) {
  requestDataSourceSync(id: $id) {
    ...IngestionJobFields
  }
}

fragment UserFields on User {
  id
  email
  displayName
  role
  status
  deletedAt
}

fragment DataSourceFields on DataSource {
  id
  workspaceId
  ownerUserId
  type
  name
  status
  syncMode
  visibility
  notionRootPageId
  lastSyncedAt
  deletedAt
}

fragment WorkspaceFields on Workspace {
  id
  ownerUserId
  name
  deletedAt
}

fragment ExternalIdentityFields on ExternalIdentity {
  id
  workspaceId
  userId
  provider
  externalWorkspaceId
  externalUserId
  email
  displayName
  principalKey
}

fragment IngestionJobFields on IngestionJob {
  id
  workspaceId
  dataSourceId
  triggerType
  status
  errorMessage
  startedAt
  finishedAt
  createdAt
}
